cvm-version: 0.7.5
cpus: 32
gpus: 8
memory: 524288

models:
  - name: "deepseek-v4-pro"
    repo: "deepseek-ai/DeepSeek-V4-Pro@45040942eb0d1c4e29fa6b92a6195f110e9e7444"
    mpk: "fbae9c191378f86ef4cc6541aebd7c3f6679ddb395cb7851c587d8d7d1bca096_864744366080_a01e8956-0add-5c02-8d55-3e1da63309f5"

containers:
  - name: "deepseek-v4-pro"
    image: "vllm/vllm-openai:v0.20.0-cu130-ubuntu2404@sha256:aff65d7198dd284c37dd0a18a606544cc5e92bfb0d5eb608b77e8b8f1c6b8b0d"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    env:
      - VLLM_ENGINE_READY_TIMEOUT_S: "3600"
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
    command: [
      "--model", "/tinfoil/mpk/mpk-fbae9c191378f86ef4cc6541aebd7c3f6679ddb395cb7851c587d8d7d1bca096_864744366080",
      "--trust-remote-code",
      "--kv-cache-dtype", "fp8",
      "--block-size", "256",
      "--enable-expert-parallel",
      "--data-parallel-size", "8",
      "--max-model-len", "800000",
      "--gpu-memory-utilization", "0.95",
      "--max-num-seqs", "512",
      "--max-num-batched-tokens", "512",
      "--no-enable-flashinfer-autotune",
      "--compilation-config", "{\"mode\": 0, \"cudagraph_mode\": \"FULL_DECODE_ONLY\"}",
      "--tokenizer-mode", "deepseek_v4",
      "--tool-call-parser", "deepseek_v4",
      "--enable-auto-tool-choice",
      "--reasoning-parser", "deepseek_v4",
      "--served-model-name", "deepseek-v4-pro",
      "--port", "8001"
    ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 60m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
    - /health
