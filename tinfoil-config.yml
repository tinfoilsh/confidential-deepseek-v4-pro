cvm-version: 0.10.2
cpus: 32
gpus: 8
memory: 524288

models:
  - name: "deepseek-v4-pro"
    repo: "deepseek-ai/DeepSeek-V4-Pro@45040942eb0d1c4e29fa6b92a6195f110e9e7444"
    mpk: "fbae9c191378f86ef4cc6541aebd7c3f6679ddb395cb7851c587d8d7d1bca096_864744366080_a01e8956-0add-5c02-8d55-3e1da63309f5"

containers:
  - name: "deepseek-v4-pro"
    image: "vllm/vllm-openai:v0.22.0@sha256:0fec7ec5f3e6bc168e54899935fb0557da908a4832a1dbc88e2debcf2f889416"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    read_only: false
    cap_add:
      - IPC_LOCK
      - SYS_RESOURCE
      - SYS_NICE
    env:
      - VLLM_ENGINE_READY_TIMEOUT_S: "3600"
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
    command: [
      "--model", "/tinfoil/mpk/mpk-fbae9c191378f86ef4cc6541aebd7c3f6679ddb395cb7851c587d8d7d1bca096",
      "--trust-remote-code",
      "--kv-cache-dtype", "fp8",
      "--block-size", "256",
      "--enable-expert-parallel",
      "--data-parallel-size", "8",
      "--max-model-len", "800000",
      "--gpu-memory-utilization", "0.95",
      "--max-num-seqs", "512",
      "--max-num-batched-tokens", "512",
      "--no-enable-flashinfer-autotune",
      "--compilation-config", "{\"mode\": 0, \"cudagraph_mode\": \"FULL_DECODE_ONLY\"}",
      "--tokenizer-mode", "deepseek_v4",
      "--tool-call-parser", "deepseek_v4",
      "--enable-auto-tool-choice",
      "--reasoning-parser", "deepseek_v4",
      "--served-model-name", "deepseek-v4-pro",
      "--port", "8001"
    ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 60m
    tmpfs:
      /tmp: size=512m,mode=1777,exec
      /root: size=2g,mode=0700,exec

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
    - /health
